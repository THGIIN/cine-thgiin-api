# App + PostgreSQL: `docker compose up --build`
# App aguarda Postgres saudável; aplica migrations e inicia a API.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cinearquivo
    ports:
      - '5432:5432'
    volumes:
      - cinearquivo_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d cinearquivo']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cinearquivo?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -c
      - npx prisma migrate deploy && node -r tsconfig-paths/register dist/main.js

volumes:
  cinearquivo_pg:
